# Local dev stack — Postgres + Redis + MinIO.
# Production deployment dùng managed Postgres + Redis (xem docs/deploy.md).
services:
  postgres:
    image: postgres:16-alpine
    container_name: buocvang-postgres
    environment:
      POSTGRES_USER: buocvang
      POSTGRES_PASSWORD: buocvang
      POSTGRES_DB: buocvang
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buocvang -d buocvang"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: buocvang-redis
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--save", ""]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: buocvang-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Tạo bucket buocvang-assets nếu chưa có.
  minio-init:
    image: minio/mc:RELEASE.2024-09-09T07-53-10Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb -p local/buocvang-assets || true &&
        mc anonymous set download local/buocvang-assets || true
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
